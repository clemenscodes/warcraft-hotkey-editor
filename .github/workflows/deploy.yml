---
name: Deploy to GitHub Pages

"on":
  push:
    branches: [main]
    tags: [v*]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Nix-based Rust checks — fmt, clippy (native), tests.
  # All derivations reuse cargoArtifactsNative from Cachix so there is
  # no second Rust compilation step; a warm Cachix hit is nearly instant.
  nix-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Use Cachix
        uses: cachix/cachix-action@v17
        with:
          name: clemenscodes
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          useDaemon: true
          pushFilter: '(-source$|nixpkgs\.tar\.gz$)'

      - name: Build native cargo artifacts
        run: >
          nix build .#cargoArtifactsNative
          --accept-flake-config
          --print-build-logs

      - name: Format, lint and test
        run: >
          nix build
          .#cargoFmt
          .#cargoClippyNative
          .#cargoTestNative
          --accept-flake-config
          --print-build-logs

  # Nix-based build: produces the static bundle then runs playwright e2e
  # tests against it. Runs in parallel with rust-checks.
  # Slow on first run (cold Nix store) but subsequent runs are fast once
  # Cachix is warm.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Use Cachix
        uses: cachix/cachix-action@v17
        with:
          name: clemenscodes
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          useDaemon: true
          pushFilter: '(-source$|nixpkgs\.tar\.gz$)'

      - name: Build WASM cargo artifacts and CI tools
        run: >
          nix build
          .#ci-cache-tools
          .#cargoArtifacts
          --accept-flake-config
          --print-build-logs

      - name: Lint WASM and build static bundle
        run: >
          nix build
          .#cargoClippyWasm
          .#warcraft-hotkey-editor
          --accept-flake-config
          --print-build-logs

      - name: Run e2e tests
        run: >
          nix shell .#ci-cache-tools
          --accept-flake-config
          --command moon run hotkey-editor:playwright/ci

      - name: Stage Pages artifact
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p ./pages-out
          cp -RL ./result/. ./pages-out/

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./pages-out

      - name: Package release pages
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tar -czf "./warcraft-hotkey-editor-${{ github.ref_name }}-pages.tar.gz" -C ./pages-out .

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: ./warcraft-hotkey-editor-${{ github.ref_name }}-pages.tar.gz

  deploy:
    needs: [nix-checks, build]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

---
name: Deploy to GitHub Pages

"on":
  push:
    branches: [main]
    tags: [v*]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare Moon base ref
        run: |
          git fetch origin main
          if ! git show-ref --verify --quiet refs/heads/main; then
            git branch main FETCH_HEAD
          fi

      - name: Restore Rust and Moon cache
        uses: actions/cache@v5
        with:
          path: |
            target
            .moon/cache
            ~/.cargo/registry
            ~/.cargo/git
            crates/hotkey-editor/assets/tailwind.css
          key: >
            ${{ runner.os }}-checks-${{
            hashFiles(
            'Cargo.lock',
            'rust-toolchain.toml',
            'flake.lock',
            '.moon/**/*.yml',
            'moon.yml',
            'crates/**/moon.yml',
            'crates/**/Cargo.toml',
            'crates/hotkey-editor/tailwind.input.css',
            'crates/hotkey-editor/styles/**/*.css'
            ) }}
          restore-keys: |
            ${{ runner.os }}-checks-

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Use Cachix
        if: github.event_name != 'pull_request'
        uses: cachix/cachix-action@v17
        with:
          name: clemenscodes
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          useDaemon: true
          pushFilter: '(-source$|nixpkgs\.tar\.gz$)'

      - name: Use Cachix read-only
        if: github.event_name == 'pull_request'
        uses: cachix/cachix-action@v17
        with:
          name: clemenscodes
          skipPush: true

      - name: Build generated assets
        run: >
          nix develop
          --accept-flake-config
          --command moon run hotkey-editor:tailwind/build

      - name: Run checks
        run: >
          nix develop
          --accept-flake-config
          --command moon run :ci

  build:
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Use Cachix
        if: github.event_name != 'pull_request'
        uses: cachix/cachix-action@v17
        with:
          name: clemenscodes
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          useDaemon: true
          pushFilter: '(-source$|nixpkgs\.tar\.gz$)'

      - name: Use Cachix read-only
        if: github.event_name == 'pull_request'
        uses: cachix/cachix-action@v17
        with:
          name: clemenscodes
          skipPush: true

      - name: Build priority cache inputs
        run: >
          nix build
          .#ci-cache-tools
          .#cargoArtifacts
          --accept-flake-config
          --print-build-logs

      # `nix build .#warcraft-hotkey-editor` runs the full pipeline:
      # stable Rust + wasm32 target → dx build → tailwind → wasm-bindgen
      # → wasm-opt. The derivation's installPhase already adds
      # `.nojekyll` and `404.html`, so the output at ./result is exactly
      # what GH Pages expects — no post-processing here.
      - name: Build the static bundle
        run: >
          nix build .#warcraft-hotkey-editor
          --accept-flake-config
          --print-build-logs

      - name: Stage Pages artifact
        if: github.event_name != 'pull_request'
        run: |
          # `cp -RL` dereferences the /nix/store symlink so the upload
          # action gets a regular tree rather than a single symlink.
          mkdir -p ./pages-out
          cp -RL ./result/. ./pages-out/

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./pages-out

      - name: Package release pages
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tar -czf "./warcraft-hotkey-editor-${{ github.ref_name }}-pages.tar.gz" -C ./pages-out .

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: ./warcraft-hotkey-editor-${{ github.ref_name }}-pages.tar.gz

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

---
name: Deploy to GitHub Pages

"on":
  push:
    branches: [main]
    tags: [v*]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Fast Rust checks — no Nix, no playwright, no browser deps.
  # Runs cargo fmt / clippy / test directly. With rust-cache this is
  # consistently under 2 minutes even on a cold run.
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        # dtolnay reads rust-toolchain.toml automatically: pins to 1.95.0,
        # adds wasm32-unknown-unknown target and the declared components.

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      # Native crates: warcraft-api, warcraft-database, warcraft-keybinds,
      # warcraft-cli, warcraft-slk. Exclude hotkey-editor (wasm-only) and
      # warcraft-extractor (needs cmake + casclib C lib).
      - name: Clippy (native crates)
        run: >
          cargo clippy
          --workspace
          --exclude hotkey-editor
          --exclude warcraft-extractor
          -- -D warnings

      - name: Clippy (wasm crate)
        run: >
          cargo clippy
          -p hotkey-editor
          --target wasm32-unknown-unknown
          -- -D warnings

      - name: Tests (native crates)
        run: >
          cargo test
          --workspace
          --exclude hotkey-editor
          --exclude warcraft-extractor

  # Nix-based build: runs playwright e2e tests then produces the final
  # static bundle. Slow on first run (cold Nix store) but subsequent runs
  # are fast once Cachix is warm.
  build:
    needs: rust-checks
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare Moon base ref
        run: |
          git fetch origin main
          if ! git show-ref --verify --quiet refs/heads/main; then
            git branch main FETCH_HEAD
          fi

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Use Cachix
        if: github.event_name != 'pull_request'
        uses: cachix/cachix-action@v17
        with:
          name: clemenscodes
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          useDaemon: true
          pushFilter: '(-source$|nixpkgs\.tar\.gz$)'

      - name: Use Cachix read-only
        if: github.event_name == 'pull_request'
        uses: cachix/cachix-action@v17
        with:
          name: clemenscodes
          skipPush: true

      - name: Build priority cache inputs
        run: >
          nix build
          .#ci-cache-tools
          .#cargoArtifacts
          --accept-flake-config
          --print-build-logs

      - name: Run e2e tests
        run: >
          nix shell .#ci-cache-tools
          --accept-flake-config
          --command moon run hotkey-editor:playwright/test

      - name: Build the static bundle
        run: >
          nix build .#warcraft-hotkey-editor
          --accept-flake-config
          --print-build-logs

      - name: Stage Pages artifact
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p ./pages-out
          cp -RL ./result/. ./pages-out/

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./pages-out

      - name: Package release pages
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tar -czf "./warcraft-hotkey-editor-${{ github.ref_name }}-pages.tar.gz" -C ./pages-out .

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: ./warcraft-hotkey-editor-${{ github.ref_name }}-pages.tar.gz

  deploy:
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
